server:
  port: 8082

spring:
  application:
    name: billing-service
  datasource:
    url: jdbc:postgresql://localhost:5433/billing_db
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  jackson:
    serialization:
      write-dates-as-timestamps: false

logging:
  level:
    com.coworking: DEBUG
